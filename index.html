<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Spese Personali</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
      --accent:#4f9cf9;--accent-dim:#1e3a5f;--green:#34d399;--green-dim:#0d3327;
      --red:#f87171;--red-dim:#3b1515;--text:#e2e8f0;--text-muted:#64748b;--text-dim:#94a3b8;
      --font-mono:'SF Mono','Fira Code','Consolas',monospace;
      --font-ui:'Inter',system-ui,-apple-system,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:15px;-webkit-font-smoothing:antialiased}
    #app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
    #topbar{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 0}
    #topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    #app-title{font-size:1rem;font-weight:700}
    #topbar-actions{display:flex;gap:8px}
    .icon-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);border-radius:7px;padding:6px 10px;font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s}
    .icon-btn:hover{background:var(--border);color:var(--text)}
    .icon-btn svg{width:14px;height:14px}
    #month-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;scroll-behavior:smooth}
    #month-tabs::-webkit-scrollbar{display:none}
    .month-tab{flex-shrink:0;padding:8px 14px;border-radius:8px 8px 0 0;font-size:.8rem;font-weight:600;color:var(--text-muted);cursor:pointer;border:1px solid transparent;border-bottom:none;transition:all .15s;white-space:nowrap;background:transparent}
    .month-tab:hover{color:var(--text);background:var(--surface2)}
    .month-tab.active{color:var(--accent);background:var(--bg);border-color:var(--border)}
    #table-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
    #grid-header{flex-shrink:0;display:grid;grid-template-columns:48px 1fr 1fr 2fr 32px;background:var(--surface2);border-bottom:2px solid var(--border);padding:0 8px}
    .gh-cell{padding:9px 6px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
    .gh-cell.num{text-align:right}
    #grid-scroll{flex:1;overflow-y:auto;padding:0 8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .day-block{border-bottom:2px solid var(--border)}
    .day-block.today{background:rgba(79,156,249,.04)}
    .entry-row{display:grid;grid-template-columns:48px 1fr 1fr 2fr 32px;align-items:center;min-height:44px;border-bottom:1px solid rgba(46,51,80,.5);transition:background .1s}
    .entry-row:last-child{border-bottom:none}
    .entry-row:hover{background:rgba(255,255,255,.02)}
    .day-label{padding:4px 6px;font-size:.75rem;font-weight:600;color:var(--text-dim);display:flex;flex-direction:column;align-items:center;line-height:1.2}
    .day-label .dn{font-size:1rem;font-weight:700;color:var(--text)}
    .day-label .dw{font-size:.6rem;color:var(--text-muted);text-transform:uppercase}
    .day-block.today .day-label .dn{color:var(--accent)}
    .cell-input{width:100%;padding:7px 6px;background:transparent;border:none;border-left:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:.82rem;outline:none;transition:background .15s;min-height:44px}
    .cell-input::placeholder{color:var(--text-muted);opacity:.5}
    .cell-input:focus{background:var(--accent-dim)}
    .cell-input.money{text-align:right}
    .cell-input.entrate:focus{background:var(--green-dim)}
    .cell-input.uscite:focus{background:var(--red-dim)}
    .cell-input.filled-green{color:var(--green)}
    .cell-input.filled-red{color:var(--red)}
    .btn-add-row{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--accent);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:auto;transition:all .15s}
    .btn-add-row:hover{background:var(--accent-dim);border-color:var(--accent)}
    .btn-del-row{width:22px;height:22px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--text-muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:auto;transition:all .15s}
    .btn-del-row:hover{background:var(--red-dim);color:var(--red);border-color:var(--red)}
    .action-cell{display:flex;align-items:center;justify-content:center;border-left:1px solid var(--border)}
    #totals-bar{flex-shrink:0;background:var(--surface);border-top:2px solid var(--border);padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .tot-group{display:flex;flex-direction:column;align-items:center;min-width:72px}
    .tot-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
    .tot-value{font-size:.95rem;font-weight:700;font-family:var(--font-mono);margin-top:1px}
    .tot-value.green{color:var(--green)}
    .tot-value.red{color:var(--red)}
    .tot-value.accent{color:var(--accent)}
    .tot-divider{width:1px;height:32px;background:var(--border);flex-shrink:0}
    #status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto;flex-shrink:0;transition:background .3s}
    #status-dot.saving{background:#fbbf24}
    #status-dot.error{background:var(--red)}
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:24px;font-size:.82rem;opacity:0;pointer-events:none;transition:opacity .2s;z-index:100;white-space:nowrap}
    #toast.show{opacity:1}
    #export-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:20px}
    #export-modal.open{display:flex}
    #export-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px 24px;max-width:360px;width:100%}
    #export-box h3{font-size:1.1rem;font-weight:700;margin-bottom:14px}
    .exp-btn{width:100%;padding:11px;margin-bottom:8px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.9rem;cursor:pointer;text-align:left;transition:all .15s}
    .exp-btn:hover{background:var(--border)}
    .exp-close{width:100%;padding:9px;border:none;background:transparent;color:var(--text-muted);font-size:.85rem;cursor:pointer;margin-top:4px}
    @media(max-width:480px){
      #grid-header,.entry-row{grid-template-columns:38px 72px 72px 1fr 28px}
      .cell-input{font-size:.78rem;padding:6px 4px}
      .gh-cell{font-size:.62rem;padding:8px 4px}
      .day-label .dn{font-size:.9rem}
      .tot-value{font-size:.85rem}
    }
  </style>
</head>
<body>
<div id="export-modal"><div id="export-box">
  <h3>📤 Esporta dati</h3>
  <button class="exp-btn" id="exp-month">📅 Mese corrente (CSV)</button>
  <button class="exp-btn" id="exp-all">📦 Tutti i dati storici (CSV)</button>
  <button class="exp-close" id="exp-cancel">Annulla</button>
</div></div>
<div id="toast"></div>
<div id="app">
  <div id="topbar">
    <div id="topbar-row1">
      <span id="app-title">💰 Spese Personali</span>
      <div id="topbar-actions">
        <button class="icon-btn" id="btn-export">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Esporta
        </button>
      </div>
    </div>
    <div id="month-tabs"></div>
  </div>
  <div id="table-area">
    <div id="grid-header">
      <div class="gh-cell">Giorno</div>
      <div class="gh-cell num">Prelievi €</div>
      <div class="gh-cell num">Uscite €</div>
      <div class="gh-cell">Note</div>
      <div class="gh-cell"></div>
    </div>
    <div id="grid-scroll"></div>
  </div>
  <div id="totals-bar">
    <div class="tot-group"><span class="tot-label">Prelievi mese</span><span class="tot-value green" id="tot-p">€ 0,00</span></div>
    <div class="tot-group"><span class="tot-label">Uscite mese</span><span class="tot-value red" id="tot-u">€ 0,00</span></div>
    <div class="tot-group"><span class="tot-label">Saldo mese</span><span class="tot-value accent" id="tot-sm">€ 0,00</span></div>
    <div class="tot-divider"></div>
    <div class="tot-group"><span class="tot-label">Saldo globale</span><span class="tot-value accent" id="tot-sg">€ —</span></div>
    <div id="status-dot" title="Connesso"></div>
  </div>
</div>
<script>
/* ═══════════════════════════════════════════════════
   SPESE PERSONALI v4
   ═══════════════════════════════════════════════════ */
const MONTHS_IT=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_IT=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const TABLE='spese';
const SB_URL='https://zzfbtzhvvknffkosunqe.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6ZmJ0emh2dmtuZmZrb3N1bnFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDU5NDAsImV4cCI6MjA5MzEyMTk0MH0.rntb1fkpVDBc-B_V6kvZ4-Oukzl4efzZH1ga7aZLNhc';

const sb=window.supabase.createClient(SB_URL,SB_KEY);
let activeYear=new Date().getFullYear();
let activeMonth=new Date().getMonth();
// state: { [dateStr]: [ {lid, dbId, prelievi, uscite, note, dirty} ] }
let state={};
let timers={};
let seq=0;
// saldo globale calcolato una volta sola e aggiornato incrementalmente
let globalP=0, globalU=0;
let globalLoaded=false;
// flag per bloccare salvataggio durante navigazione
let navigating=false;

const $=id=>document.getElementById(id);
const lid=()=>'L'+(++seq);
const fmt=n=>(!n&&n!==0)?'':n.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
const parseNum=s=>{if(!s||!s.trim())return null;const v=parseFloat(s.replace(',','.'));return isNaN(v)?null:v;};
const dateStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const dim=(y,m)=>new Date(y,m+1,0).getDate();
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

function toast(msg,dur=2000){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function setDot(s){const d=$('status-dot');d.className='';if(s==='saving')d.classList.add('saving');else if(s==='error')d.classList.add('error');}

/* ── TABS ── */
function buildTabs(){
  const c=$('month-tabs');c.innerHTML='';
  MONTHS_IT.forEach((m,i)=>{
    const t=document.createElement('button');
    t.className='month-tab'+(i===activeMonth?' active':'');
    t.textContent=m;t.dataset.month=i;
    t.addEventListener('click',()=>goMonth(i));
    c.appendChild(t);
  });
  setTimeout(()=>{const a=c.querySelector('.active');if(a)a.scrollIntoView({inline:'center',block:'nearest'});},50);
}
function goMonth(i){
  navigating=true; // blocca blur-save durante cambio mese
  activeMonth=i;
  document.querySelectorAll('.month-tab').forEach(t=>t.classList.toggle('active',+t.dataset.month===i));
  const a=document.querySelector('.month-tab.active');if(a)a.scrollIntoView({inline:'center',block:'nearest'});
  loadMonth();
}

/* ── LOAD ── */
async function loadMonth(){
  state={};
  render();
  const first=`${activeYear}-${String(activeMonth+1).padStart(2,'0')}-01`;
  const last=`${activeYear}-${String(activeMonth+1).padStart(2,'0')}-${dim(activeYear,activeMonth)}`;
  try{
    const {data,error}=await sb.from(TABLE).select('id,data,prelievi,uscite,note').gte('data',first).lte('data',last).order('data').order('id');
    if(error)throw error;
    (data||[]).forEach(r=>{
      if(!state[r.data])state[r.data]=[];
      state[r.data].push({lid:lid(),dbId:r.id,prelievi:r.prelievi,uscite:r.uscite,note:r.note||'',dirty:false});
    });
    render();
    setDot('ok');
    navigating=false;
  }catch(e){console.error(e);setDot('error');toast('⚠️ Errore caricamento');}

  // carica saldo globale una volta sola
  if(!globalLoaded) await loadGlobal();
  else renderTotals();
}

async function loadGlobal(){
  try{
    const {data,error}=await sb.from(TABLE).select('prelievi,uscite');
    if(error)throw error;
    globalP=0;globalU=0;
    (data||[]).forEach(r=>{globalP+=r.prelievi||0;globalU+=r.uscite||0;});
    globalLoaded=true;
    renderTotals();
  }catch(e){console.error(e);}
}

/* ── RENDER ── */
function render(){
  const scroll=$('grid-scroll');
  const today=new Date();const ts=dateStr(today);
  const days=dim(activeYear,activeMonth);
  const html=[];
  for(let d=1;d<=days;d++){
    const dt=new Date(activeYear,activeMonth,d);
    const ds=dateStr(dt);
    const dow=dt.getDay();
    const isToday=ds===ts;
    const rows=state[ds]||[];
    const disp=rows.length>0?rows:[{lid:'_e_'+ds,dbId:null,prelievi:null,uscite:null,note:'',dirty:false}];
    const rowsH=disp.map((row,ri)=>{
      const isFirst=ri===0,isLast=ri===disp.length-1;
      const p=row.prelievi!=null?fmt(row.prelievi):'';
      const u=row.uscite!=null?fmt(row.uscite):'';
      const n=esc(row.note||'');
      const l=row.lid;
      const dayC=isFirst?`<div class="day-label"><span class="dn">${d}</span><span class="dw">${DAYS_IT[dow]}</span></div>`:`<div class="day-label"></div>`;
      const actC=isLast
        ?`<div class="action-cell"><button class="btn-add-row" data-date="${ds}">+</button></div>`
        :`<div class="action-cell"><button class="btn-del-row" data-lid="${l}" data-date="${ds}">×</button></div>`;
      return `<div class="entry-row" data-lid="${l}" data-date="${ds}">
        ${dayC}
        <input class="cell-input money entrate${p?' filled-green':''}" data-f="prelievi" data-lid="${l}" data-date="${ds}" type="text" inputmode="decimal" placeholder="0,00" value="${p}"/>
        <input class="cell-input money uscite${u?' filled-red':''}"   data-f="uscite"   data-lid="${l}" data-date="${ds}" type="text" inputmode="decimal" placeholder="0,00" value="${u}"/>
        <input class="cell-input note"                                  data-f="note"     data-lid="${l}" data-date="${ds}" type="text" inputmode="text"    placeholder="Descrizione…" value="${n}"/>
        ${actC}
      </div>`;
    }).join('');
    html.push(`<div class="day-block${isToday?' today':''}" data-date="${ds}">${rowsH}</div>`);
  }
  scroll.innerHTML=html.join('');
  scroll.querySelectorAll('.cell-input').forEach(i=>{
    i.addEventListener('input',onInput);
    i.addEventListener('blur',onBlur);
    i.addEventListener('keydown',onKey);
  });
  scroll.querySelectorAll('.btn-add-row').forEach(b=>b.addEventListener('click',e=>addRow(e.currentTarget.dataset.date)));
  scroll.querySelectorAll('.btn-del-row').forEach(b=>b.addEventListener('click',e=>delRow(e.currentTarget.dataset.date,e.currentTarget.dataset.lid)));
  if(activeMonth===today.getMonth()&&activeYear===today.getFullYear()){
    const tr=scroll.querySelector(`[data-date="${ts}"]`);
    if(tr)setTimeout(()=>tr.scrollIntoView({block:'center'}),100);
  }
  renderTotals();
}

/* ── ADD / DEL ── */
function addRow(ds){
  if(!state[ds])state[ds]=[];
  state[ds].push({lid:lid(),dbId:null,prelievi:null,uscite:null,note:'',dirty:false});
  render();
  const block=document.querySelector(`.day-block[data-date="${ds}"]`);
  if(block){const rows=block.querySelectorAll('.entry-row');const last=rows[rows.length-1];if(last){const inp=last.querySelector('.cell-input');if(inp)inp.focus();}}
}
async function delRow(ds,l){
  const rows=state[ds]||[];
  const row=rows.find(r=>r.lid===l);
  if(!row)return;
  // aggiorna globale prima di cancellare
  if(row.dbId){
    globalP-=row.prelievi||0;
    globalU-=row.uscite||0;
    try{
      const {error}=await sb.from(TABLE).delete().eq('id',row.dbId);
      if(error)throw error;
      setDot('ok');
    }catch(e){console.error(e);setDot('error');toast('⚠️ Errore eliminazione');
      // ripristina globale se fallisce
      globalP+=row.prelievi||0;globalU+=row.uscite||0;return;}
  }
  state[ds]=rows.filter(r=>r.lid!==l);
  render();
}

/* ── INPUT ── */
function onInput(e){
  const inp=e.target,ds=inp.dataset.date,f=inp.dataset.f,l=inp.dataset.lid,val=inp.value;
  if(f==='prelievi')inp.classList.toggle('filled-green',val.trim()!=='');
  if(f==='uscite')  inp.classList.toggle('filled-red',  val.trim()!=='');
  if(!state[ds])state[ds]=[];
  let row=state[ds].find(r=>r.lid===l);
  if(!row){row={lid:l,dbId:null,prelievi:null,uscite:null,note:'',dirty:false};state[ds].push(row);}
  const oldP=row.prelievi||0, oldU=row.uscite||0;
  if(f==='note') row.note=val;
  else row[f]=parseNum(val);
  row.dirty=true;
  // aggiorna globale incrementalmente
  if(f==='prelievi'){globalP=globalP-oldP+(row.prelievi||0);}
  if(f==='uscite')  {globalU=globalU-oldU+(row.uscite||0);}
  renderTotals();
  clearTimeout(timers[l]);
  timers[l]=setTimeout(()=>save(ds,l),1000);
}

function onBlur(e){
  // se stiamo navigando, non fare nulla
  if(navigating)return;
  const inp=e.target,f=inp.dataset.f,l=inp.dataset.lid,ds=inp.dataset.date;
  if(f!=='note'){const n=parseNum(inp.value);inp.value=n!=null?fmt(n):'';}
  const rows=state[ds]||[];
  const row=rows.find(r=>r.lid===l);
  if(row&&row.dirty){clearTimeout(timers[l]);save(ds,l);}
}

function onKey(e){
  if(e.key==='Enter'||e.key==='Tab'){
    e.preventDefault();
    const all=Array.from(document.querySelectorAll('.cell-input'));
    const next=all[all.indexOf(e.target)+(e.shiftKey?-1:1)];
    if(next){next.focus();next.select();}
  }
}

/* ── SAVE ── */
async function save(ds,l){
  if(navigating)return;
  const rows=state[ds]||[];
  const row=rows.find(r=>r.lid===l);
  if(!row)return;
  const empty=row.prelievi==null&&row.uscite==null&&(!row.note||!row.note.trim());
  if(empty){row.dirty=false;return;}
  setDot('saving');
  const payload={data:ds,prelievi:row.prelievi??null,uscite:row.uscite??null,note:row.note||null,generato_il:new Date().toISOString()};
  try{
    if(!row.dbId){
      const {data,error}=await sb.from(TABLE).insert(payload).select('id').single();
      if(error)throw error;
      row.dbId=data.id;
    }else{
      const {error}=await sb.from(TABLE).update(payload).eq('id',row.dbId);
      if(error)throw error;
    }
    row.dirty=false;
    setDot('ok');
  }catch(e){console.error(e);setDot('error');toast('⚠️ Errore salvataggio');}
}

/* ── TOTALI ── */
function renderTotals(){
  let mp=0,mu=0;
  Object.values(state).forEach(rows=>rows.forEach(r=>{mp+=r.prelievi||0;mu+=r.uscite||0;}));
  const sm=mp-mu;
  $('tot-p').textContent='€ '+fmt(mp);
  $('tot-u').textContent='€ '+fmt(mu);
  const smEl=$('tot-sm');smEl.textContent='€ '+fmt(sm);smEl.className='tot-value '+(sm>=0?'green':'red');
  if(globalLoaded){
    const sg=globalP-globalU;
    const sgEl=$('tot-sg');sgEl.textContent='€ '+fmt(sg);sgEl.className='tot-value '+(sg>=0?'green':'red');
  }
}

/* ── EXPORT ── */
async function exportCSV(scope){
  let q=sb.from(TABLE).select('data,prelievi,uscite,note,generato_il').order('data').order('id');
  if(scope==='month'){
    const first=`${activeYear}-${String(activeMonth+1).padStart(2,'0')}-01`;
    const last=`${activeYear}-${String(activeMonth+1).padStart(2,'0')}-${dim(activeYear,activeMonth)}`;
    q=q.gte('data',first).lte('data',last);
  }
  toast('⏳ Preparazione…',3000);
  const {data,error}=await q;
  if(error){toast('⚠️ Errore export');return;}
  const hdr='Data,Giorno,Prelievi,Uscite,Note,Generato_il';
  const rows=(data||[]).map(r=>{
    const dw=DAYS_IT[new Date(r.data+'T00:00:00').getDay()];
    return [r.data,dw,r.prelievi!=null?String(r.prelievi).replace('.',','):'',r.uscite!=null?String(r.uscite).replace('.',','):'',('"'+(r.note||'').replace(/"/g,'""')+'"'),r.generato_il||''].join(',');
  });
  const csv=[hdr,...rows].join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=scope==='month'?`spese_${MONTHS_IT[activeMonth].toLowerCase()}_${activeYear}.csv`:`spese_storici_${activeYear}.csv`;
  a.click();URL.revokeObjectURL(url);toast('✅ Export completato');
}

$('btn-export').addEventListener('click',()=>$('export-modal').classList.add('open'));
$('exp-cancel').addEventListener('click',()=>$('export-modal').classList.remove('open'));
$('exp-month').addEventListener('click',()=>{$('export-modal').classList.remove('open');exportCSV('month');});
$('exp-all').addEventListener('click',()=>{$('export-modal').classList.remove('open');exportCSV('all');});
$('export-modal').addEventListener('click',e=>{if(e.target===$('export-modal'))$('export-modal').classList.remove('open');});

// blocca navigating su beforeunload per evitare save spurii
window.addEventListener('beforeunload',()=>{navigating=true;});

buildTabs();
loadMonth();
</script>
